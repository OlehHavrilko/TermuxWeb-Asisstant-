name: termux_assistant
description: A Flutter app for managing Termux locally on Android
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  flutter_spinkit: ^5.2.1
  shimmer: ^3.0.0
  
  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  
  # Storage
  shared_preferences: ^2.3.2
  sqflite: ^2.3.3+1
  path_provider: ^2.1.4
  
  # Terminal
  xterm: ^4.0.0
  
  # Network & HTTP
  http: ^1.2.2
  web_socket_channel: ^3.0.1
  
  # Utils
  intl: ^0.19.0
  uuid: ^4.5.1
  permission_handler: ^11.3.1
  url_launcher: ^6.3.1
  
  # File Picker
  file_picker: ^8.1.3
  
  # Syntax Highlighting  
  flutter_highlight: ^0.7.0
  highlight: ^0.7.0
  
  # Charts
  fl_chart: ^0.69.0
  
  # Notifications
  flutter_local_notifications: ^17.2.3
  
  # Device Info
  device_info_plus: ^10.1.2
  battery_plus: ^6.0.3
  network_info_plus: ^5.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/icons/
